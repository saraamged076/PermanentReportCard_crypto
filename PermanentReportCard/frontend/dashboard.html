<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">

    <h2 id="title"></h2>

    <input id="student" placeholder="Student Address">

    <!-- USER MENU -->
    <div id="userMenu">
        <button onclick="viewGrade()">View Grade</button>
        <button onclick="checkBalance()">Check Balance</button>
        <button onclick="activity()">Activity History</button>
    </div>

    <!-- ADMIN MENU -->
    <div id="adminMenu">

        <input id="grade" placeholder="Grade">
        <button onclick="addGrade()">Add Grade</button>

        <input id="newGrade" placeholder="New Grade">
        <button onclick="updateGrade()">Update Grade</button>

        <input id="amount" placeholder="Coins">
        <button onclick="mint()">Mint Coins</button>

    </div>

    <p id="result"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
<script src="app.js"></script>

</body>
</html>
